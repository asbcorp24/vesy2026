<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartBasket Admin</title>
  <style>
    :root {
      --bg: #f4f7f6;
      --card: #ffffff;
      --ink: #16322d;
      --muted: #61736f;
      --line: rgba(22, 50, 45, 0.10);
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.12), transparent 24%),
        linear-gradient(180deg, #f8fbfa 0%, var(--bg) 100%);
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero,
    .panel {
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(18, 52, 45, 0.08);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .panel {
      padding: 20px;
    }

    .muted {
      color: var(--muted);
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      padding: 11px 18px;
      cursor: pointer;
      font-weight: 600;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
      max-height: 480px;
      overflow: auto;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fbfdfc;
      padding: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      margin-top: 14px;
      border: 1px solid var(--line);
      background: #f8fbfa;
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
      min-height: 48px;
    }

    @media (max-width: 960px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <h1 style="margin:0 0 8px">Админка SmartBasket</h1>
        <div class="muted">Создание ритейлоров, генерация PIN и добавление магазинов без Swagger.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button onclick="loadAll()">Обновить</button>
        <a href="/" style="text-decoration:none"><button type="button">Мониторинг</button></a>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2 style="margin-top:0">Создать ритейлора</h2>
        <div class="field">
          <label for="retailerName">Название ритейлора</label>
          <input id="retailerName" placeholder="Retail Group 1">
        </div>
        <button onclick="createRetailer()">Создать ритейлора</button>
        <div id="retailerStatus" class="status">Здесь появится результат создания ритейлора.</div>

        <h3 style="margin:24px 0 12px">Ритейлоры</h3>
        <div id="retailerList" class="list"></div>
      </div>

      <div class="panel">
        <h2 style="margin-top:0">Создать магазин</h2>
        <div class="field">
          <label for="storeRetailerId">Ритейлор</label>
          <select id="storeRetailerId">
            <option value="">Сначала создайте или загрузите ритейлора</option>
          </select>
        </div>
        <div class="field">
          <label for="storeName">Название магазина</label>
          <input id="storeName" placeholder="Магазин Юг">
        </div>
        <div class="field">
          <label for="storeLocation">Адрес или расположение</label>
          <input id="storeLocation" placeholder="Краснодар, ул. Пример">
        </div>
        <div class="field">
          <label for="storeCode">Код магазина</label>
          <input id="storeCode" placeholder="SOUTH-01">
        </div>
        <button onclick="createStore()">Создать магазин</button>
        <div id="storeStatus" class="status">Здесь появится результат создания магазина.</div>

        <h3 style="margin:24px 0 12px">Магазины</h3>
        <div id="storeList" class="list"></div>
      </div>
    </section>
  </div>

  <script>
    let retailers = [];
    let stores = [];

    async function api(url, method = 'GET', body) {
      const options = { method, headers: {} };
      if (body) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(body);
      }
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function setStatus(id, text) {
      document.getElementById(id).textContent = text;
    }

    function renderRetailers() {
      const select = document.getElementById('storeRetailerId');
      if (!retailers.length) {
        select.innerHTML = '<option value="">Ритейлоры не найдены</option>';
        document.getElementById('retailerList').innerHTML = '<div class="status">Ритейлоры пока не созданы.</div>';
        return;
      }

      select.innerHTML = retailers.map(item =>
        `<option value="${item.retailerId}">${item.name} (${item.pinCode})</option>`
      ).join('');

      document.getElementById('retailerList').innerHTML = retailers.map(item => `
        <div class="item">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap">
            <strong>${item.name}</strong>
            <span class="pill">PIN: ${item.pinCode}</span>
          </div>
          <div class="muted" style="margin-top:8px">${item.retailerId}</div>
        </div>
      `).join('');
    }

    function renderStores() {
      if (!stores.length) {
        document.getElementById('storeList').innerHTML = '<div class="status">Магазины пока не созданы.</div>';
        return;
      }

      document.getElementById('storeList').innerHTML = stores.map(item => `
        <div class="item">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap">
            <strong>${item.storeName}</strong>
            <span class="pill">${item.code || 'без кода'}</span>
          </div>
          <div class="muted" style="margin-top:8px">${item.retailerName} · ${item.location || 'Адрес не указан'}</div>
          <div class="muted" style="margin-top:6px">${item.storeId}</div>
        </div>
      `).join('');
    }

    async function loadRetailers() {
      const data = await api('/api/admin/retailers');
      retailers = data.items || [];
      renderRetailers();
    }

    async function loadStores() {
      const data = await api('/api/admin/stores');
      stores = data.items || [];
      renderStores();
    }

    async function loadAll() {
      await Promise.all([loadRetailers(), loadStores()]);
    }

    async function createRetailer() {
      try {
        const name = document.getElementById('retailerName').value.trim();
        if (!name) {
          setStatus('retailerStatus', 'Введите название ритейлора.');
          return;
        }
        const result = await api('/api/admin/retailers', 'POST', { name });
        document.getElementById('retailerName').value = '';
        setStatus('retailerStatus', `Создан ритейлор "${result.name}" с PIN ${result.pinCode}.`);
        await loadRetailers();
      } catch (error) {
        setStatus('retailerStatus', `Ошибка создания ритейлора: ${error.message}`);
      }
    }

    async function createStore() {
      try {
        const payload = {
          retailerId: document.getElementById('storeRetailerId').value,
          name: document.getElementById('storeName').value.trim(),
          location: document.getElementById('storeLocation').value.trim(),
          code: document.getElementById('storeCode').value.trim()
        };
        if (!payload.retailerId || !payload.name) {
          setStatus('storeStatus', 'Выберите ритейлора и введите название магазина.');
          return;
        }
        const result = await api('/api/admin/stores', 'POST', payload);
        document.getElementById('storeName').value = '';
        document.getElementById('storeLocation').value = '';
        document.getElementById('storeCode').value = '';
        setStatus('storeStatus', `Создан магазин "${result.storeName}" для ритейлора ${result.retailerId}.`);
        await loadStores();
      } catch (error) {
        setStatus('storeStatus', `Ошибка создания магазина: ${error.message}`);
      }
    }

    loadAll();
  </script>
</body>
</html>
